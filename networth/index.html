<style>
:root{
  --bg:#16130d; --surface:#1f1b13; --surface2:#282318; --line:#3a3223;
  --ink:#efe7d4; --muted:#a2977e; --faint:#6f6650;
  --gold:#e0b34e; --gold-dim:#8a6d2a; --neg:#c96a6a;
  --r-Common:#9aa0aa; --r-Uncommon:#63a97a; --r-Rare:#e0b34e; --r-Ancient:#b183df;
  --r-Event:#69a0c2; --r-Shop:#d09a44; --r-Starter:#8a97a6; --r-None:#7d7d7d;
  --r-Basic:#8b8f97; --r-Curse:#c56a78; --r-Status:#95897a; --r-Token:#83917f; --r-Quest:#c4a35f;
  --serif:"Palatino Linotype",Palatino,"Iowan Old Style",Georgia,"Nanum Myeongjo",serif;
  --sans:system-ui,-apple-system,"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;
}
:root[data-theme="dark"]{ --bg:#16130d; --surface:#1f1b13; --surface2:#282318; --line:#3a3223; --ink:#efe7d4; --muted:#a2977e; --faint:#6f6650; --gold-dim:#8a6d2a;}
:root[data-theme="light"]{ --bg:#f2ead6; --surface:#fbf5e6; --surface2:#f4ecd6; --line:#dcceac; --ink:#2a2318; --muted:#6e6247; --faint:#a3966f; --gold-dim:#b98f34;}
@media (prefers-color-scheme:light){
  :root:not([data-theme]){ --bg:#f2ead6; --surface:#fbf5e6; --surface2:#f4ecd6; --line:#dcceac; --ink:#2a2318; --muted:#6e6247; --faint:#a3966f; --gold-dim:#b98f34;}
}
*{box-sizing:border-box}
.wrap{max-width:1000px;margin:0 auto;padding:28px 20px 60px;color:var(--ink);background:var(--bg);
  font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;
  border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:20px}
h1{font-family:var(--serif);font-weight:600;font-size:30px;margin:0;letter-spacing:.01em;text-wrap:balance}
.sub{color:var(--muted);font-size:13.5px;margin-top:5px}
.sub b{color:var(--gold);font-weight:600}
.themebtn{background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:8px;
  padding:7px 12px;font:inherit;font-size:12.5px;cursor:pointer}
.themebtn:hover{color:var(--ink)}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{font-family:var(--serif);font-size:16px;background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);padding:6px 12px 8px;cursor:pointer}
.tab[aria-selected="true"]{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--ink)}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
.chip{font-size:12px;letter-spacing:.02em;background:var(--surface);border:1px solid var(--line);color:var(--muted);
  border-radius:999px;padding:5px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.chip:hover{color:var(--ink)}
.chip.on{color:var(--ink);border-color:var(--dot,var(--gold));background:color-mix(in srgb,var(--dot,var(--gold)) 16%,var(--surface))}
.chip .dot{width:8px;height:8px;border-radius:2px;background:var(--dot,var(--muted))}
.search{margin-left:auto;background:var(--surface);border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:7px 11px;font:inherit;font-size:13px;width:170px}
.search::placeholder{color:var(--faint)}
.meta{display:flex;justify-content:space-between;align-items:center;color:var(--faint);font-size:12px;margin:14px 2px 8px}
.sortbtn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:4px 10px;font:inherit;font-size:12px;cursor:pointer}
.sortbtn:hover{color:var(--ink)}
.list{display:flex;flex-direction:column;gap:3px}
.row{display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:12px;
  background:var(--surface);border:1px solid transparent;border-radius:9px;padding:9px 13px;overflow:hidden}
.row:hover{border-color:var(--line);background:var(--surface2)}
.rank{font-family:var(--serif);font-size:15px;color:var(--faint);text-align:right;font-variant-numeric:tabular-nums}
.rank.top{color:var(--gold)}
.name{display:flex;flex-direction:column;gap:1px;min-width:0}
.ko{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.enr{display:flex;gap:8px;align-items:center;color:var(--faint);font-size:11.5px}
.en{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.rc{font-size:10.5px;letter-spacing:.03em;padding:1.5px 7px;border-radius:999px;white-space:nowrap;color:#12100b;background:var(--dot,#888);font-weight:600}
.val{text-align:right;min-width:110px}
.g{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--gold);font-variant-numeric:tabular-nums}
.g.neg{color:var(--neg)}
.g small{font-size:11px;color:var(--faint);font-weight:400;margin-left:1px}
.bar{grid-column:1/-1;height:3px;border-radius:2px;margin-top:8px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));min-width:2px}
.bar.neg{background:linear-gradient(90deg,color-mix(in srgb,var(--neg) 40%,transparent),var(--neg))}
.empty{color:var(--faint);text-align:center;padding:40px;font-size:14px}
.foot{color:var(--faint);font-size:11.5px;margin-top:26px;line-height:1.6;border-top:1px solid var(--line);padding-top:14px}
@media (max-width:560px){
  .wrap{padding:16px 12px 48px}
  h1{font-size:22px}
  .sub{font-size:11.5px}
  .top{padding-bottom:14px;margin-bottom:16px}
  .tab{font-size:14px;padding:6px 9px 8px}
  .controls{gap:6px}
  .chip{font-size:11px;padding:5px 9px}
  .search{margin-left:0;width:100%}
  .row{padding:8px 11px;gap:9px;grid-template-columns:26px 1fr auto}
  .rank{font-size:13px}
  .ko{font-size:14px}
  .enr{font-size:10.5px;gap:6px}
  .en{max-width:120px}
  .g{font-size:16px}
  .val{min-width:76px}
  .foot{font-size:11px}
}
</style>

</div>

  if(tab!=='relics'){
    const chars=[...new Set(all.map(r=>r.cat))].filter(Boolean);
    const sep=document.createElement('span'); sep.style.cssText='width:1px;height:20px;background:var(--line);margin:0 3px';
    f.appendChild(sep);
    chars.forEach(ch=>{
      const c=document.createElement('button');
      c.className='chip'+(charSel.has(ch)?' on':''); c.style.setProperty('--dot','var(--muted)');
      c.textContent=CKO[ch]||ch;
      c.onclick=()=>{charSel.has(ch)?charSel.delete(ch):charSel.add(ch);render();buildFilters();};
      f.appendChild(c);
    });
  }
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function render(){
  let rs=rows();
  if(rarSel.size) rs=rs.filter(r=>rarSel.has(r.rarity));
  if(charSel.size) rs=rs.filter(r=>charSel.has(r.cat));
  if(q) rs=rs.filter(r=>(r.ko+' '+r.en).toLowerCase().includes(q));
  rs.sort((a,b)=>desc?b.v-a.v:a.v-b.v);
  const maxAbs=Math.max(1,...rs.map(r=>Math.abs(r.v)));
  document.getElementById('count').textContent=rs.length+'개 · 최고 '+Math.max(0,...rs.map(r=>r.v)).toLocaleString()+'G';
  const L=document.getElementById('list');
  if(!rs.length){L.innerHTML='<div class="empty">해당 조건의 항목이 없습니다.</div>';return;}
  L.innerHTML=rs.map((r,i)=>{
    const neg=r.v<0, w=Math.max(2,Math.abs(r.v)/maxAbs*100), rank=i+1;
    return '<div class="row">'
      +'<div class="rank'+(rank<=3?' top':'')+'">'+rank+'</div>'
      +'<div class="name"><span class="ko">'+esc(r.ko)+'</span>'
        +'<span class="enr"><span class="en">'+esc(r.en)+'</span>'
        +'<span class="rc" style="--dot:'+rarColor(r.rarity)+'">'+(RKO[r.rarity]||r.rarity)+'</span>'
        +(r.cat?'<span style="color:var(--faint)">'+(CKO[r.cat]||r.cat)+'</span>':'')+'</span></div>'
      +'<div class="val"><span class="g'+(neg?' neg':'')+'">'+(neg?'−':'')+Math.abs(r.v).toLocaleString()+'<small>G</small></span></div>'
      +'<div class="bar'+(neg?' neg':'')+'" style="width:'+w+'%"></div>'
    +'</div>';
  }).join('');
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected',x===t));
  tab=t.dataset.tab; rarSel.clear(); charSel.clear(); buildFilters(); render();
});
document.getElementById('q').oninput=e=>{q=e.target.value.trim().toLowerCase();render();};
document.getElementById('sort').onclick=e=>{desc=!desc;e.target.textContent='가치 '+(desc?'내림차순 ▾':'오름차순 ▴');render();};
document.getElementById('theme').onclick=()=>{
  const r=document.documentElement, cur=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  r.setAttribute('data-theme',cur==='dark'?'light':'dark'); buildFilters(); render();
};
document.getElementById('foot').innerHTML='값 산정: 상점 판매 카드·유물은 게임 정가(카드 50/75/150 · 유물 175/225/275/상점200), 비매품은 유사 효과 기반 추정. 카드 강화값은 강화 전후 수치 델타(+키워드 효과)로 카드별 산정, 저주는 제거비 −75. 타 모드 콘텐츠는 제외. · Sts2NetWorth 자산 감정 데이터 (v0.107.1)';
buildFilters(); render();
</script>
